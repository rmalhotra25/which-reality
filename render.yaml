services:
  - type: web
    name: tradeiq
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm install && npm run build
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # you will enter this manually in the Render dashboard
      - key: DB_PATH
        value: /tmp/trading.db
      - key: PYTHON_VERSION
        value: 3.11.0
