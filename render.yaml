services:
  - type: web
    name: tradeiq
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm install && npm run build
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # enter manually in Render dashboard
      - key: DATABASE_URL
        sync: false          # paste your Neon/Supabase PostgreSQL connection string here
      - key: PYTHON_VERSION
        value: 3.11.0
